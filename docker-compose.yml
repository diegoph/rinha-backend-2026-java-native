services:
  lb:
    image: nginx:1.27-alpine
    container_name: rinha-java-lb
    ports:
      - "9999:9999"
    volumes:
      - sockets:/sockets
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.14"
          memory: "15MB"

  api1:
    image: dgoschmidtt/rinha-backend-2026-java-native:1.1
    container_name: rinha-java-api1
    command:
      - "-Divf.nprobe=1"
      - "-Dknn.slots=1"
      - "-Dserver.backlog=8192"
      - "-Dserver.inbuf=768"
      - "-Dserver.outbuf=512"
      - "-Dserver.header.max=2048"
      - "-Dserver.body.max=8192"
      - "-Dstartup.warmup.searches=0"
    environment:
      SOCKET_PATH: /sockets/api1.sock
    volumes:
      - sockets:/sockets
    logging:
      driver: "none"
    deploy:
      resources:
        limits:
          cpus: "0.43"
          memory: "167MB"

  api2:
    image: dgoschmidtt/rinha-backend-2026-java-native:1.1
    container_name: rinha-java-api2
    depends_on:
      - api1
    command:
      - "-Divf.nprobe=1"
      - "-Dknn.slots=1"
      - "-Dserver.backlog=8192"
      - "-Dserver.inbuf=768"
      - "-Dserver.outbuf=512"
      - "-Dserver.header.max=2048"
      - "-Dserver.body.max=8192"
      - "-Dstartup.warmup.searches=0"
    environment:
      SOCKET_PATH: /sockets/api2.sock
    volumes:
      - sockets:/sockets
    logging:
      driver: "none"
    deploy:
      resources:
        limits:
          cpus: "0.43"
          memory: "167MB"

volumes:
  sockets:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=1m,nr_inodes=8,mode=0777,noatime,nosuid,nodev"
