worker_processes 2;

events {
    worker_connections 8192;
    use epoll;
}

stream {
    upstream api {
        server unix:/sockets/api1.sock;
        server unix:/sockets/api2.sock;
    }

    server {
        listen 9999 backlog=8192;
        proxy_connect_timeout 50ms;
        proxy_timeout 2s;
        proxy_pass api;
    }
}
